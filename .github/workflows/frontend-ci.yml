name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/**"
  pull_request:
    branches: [main]
    paths:
      - "frontend/**"
      - "docs/**"
      - ".github/workflows/**"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: |
          corepack enable
          corepack prepare pnpm@9.15.9 --activate
      - name: Install dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Build frontend
        working-directory: frontend
        run: pnpm build
